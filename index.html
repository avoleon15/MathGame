<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Game</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body class="lvl1Color">

    <div class="container mainBox">
        <div class="container text-center">
            <div class="set">

                <button class="0 number">0</button>
                <button class="1 number">1</button>
                <button class="2 number">2</button>
                <button class="3 number">3</button>
                <button class="4 number">4</button>
                <button class="5 number">5</button>
                <button class="6 number">6</button>
                <button class="7 number">7</button>
                <button class="8 number">8</button>
                <button class="9 number">9</button>
            </div>
        </div>

        <div class="container text-center">
            <h1 id="head" class="lvl1Text">press ANY button to START</h1>
        </div>
    </div>

    <div class="container h-100">
        <div class="row justify-content-between position-fixed bottom-0 w-100">
            <div class="col d-flex align-items-end">
                <div id="score" class="lvl1Text">Score: 0</div>
            </div>
            <div class="col d-flex align-items-end mb-5 ms-5">
                <div id="health" class="align-bottom hstack">
                    <div id ="heart1" class="heart"></div>
                    <div id ="heart2" class="heart"></div>
                    <div id ="heart3" class="heart"></div>
                </div>
            </div>
        </div>
    </div>



    <script src="./script.js"></script>

</body>
</html>
